name: nanopore-trna-modifications
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Core Python environment
  - python=3.9
  - pip
  
  # Bioinformatics tools
  - bwa=0.7.17
  - samtools=1.15.1
  - bcftools=1.15.1
  
  # Python data science stack
  - numpy=1.21.0
  - pandas=1.5.0
  - scipy=1.9.0
  - matplotlib=3.6.0
  - seaborn=0.12.0
  - plotly=5.11.0
  
  # Bioinformatics Python packages
  - pysam=0.19.0
  - biopython=1.79
  
  # Statistical analysis
  - statsmodels=0.13.0
  - scikit-learn=1.1.0
  
  # Jupyter for analysis
  - jupyter=1.0.0
  - ipykernel=6.15.0
  
  # Visualization
  - graphviz=2.50.0
  
  pip:
    # Oxford Nanopore specific tools (if available via pip)
    - ont-fast5-api
    - pod5
    # Custom analysis packages
    - logomaker  # For sequence logos
    - upsetplot  # For set visualization
